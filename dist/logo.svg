<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VulNexus browser icon</title>
  <desc id="desc">VulNexus icon with VN monogram, network intelligence nodes, scan target ring, blue and gold palette, and red risk accents.</desc>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#F7FBFF"/>
      <stop offset="58%" stop-color="#EAF3FF"/>
      <stop offset="100%" stop-color="#DCEBFA"/>
    </radialGradient>
    <linearGradient id="blueGrad" x1="0%" y1="15%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B57A5"/>
      <stop offset="42%" stop-color="#073B7A"/>
      <stop offset="100%" stop-color="#021D44"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="10%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#F0D28A"/>
      <stop offset="45%" stop-color="#C99A42"/>
      <stop offset="100%" stop-color="#9C7026"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EED8A5"/>
      <stop offset="100%" stop-color="#B78B3E"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4C45"/>
      <stop offset="100%" stop-color="#B90012"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B2345" flood-opacity="0.10"/>
    </filter>
    <filter id="nodeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#021D44" flood-opacity="0.18"/>
    </filter>
    <style>
      .ring { fill:none; stroke:#06458A; stroke-width:17; stroke-linecap:butt; }
      .tick { fill:#06458A; }
      .net-line { fill:none; stroke:#B88A38; stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; opacity:.78; }
      .dash-ring { fill:none; stroke:#C89B45; stroke-width:4; stroke-linecap:round; stroke-dasharray:14 16; opacity:.95; }
      .node-blue { fill:url(#blueGrad); stroke:#D2A24A; stroke-width:4; filter:url(#nodeShadow); }
      .node-gold { fill:url(#goldSoft); stroke:#F4E2B0; stroke-width:2.5; filter:url(#nodeShadow); }
      .node-red { fill:url(#redGrad); stroke:#D2A24A; stroke-width:4; filter:url(#nodeShadow); }
      .wordmark { font-family: Montserrat, Poppins, Segoe UI, Arial, sans-serif; font-weight: 800; letter-spacing: -6px; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <g id="vulnexus-icon" transform="translate(600 600) scale(1.3)" filter="url(#softShadow)">
    <path class="ring" d="M -255 -110 A 278 278 0 0 1 -35 -274"/>
    <path class="ring" d="M 35 -274 A 278 278 0 0 1 255 -110"/>
    <path class="ring" d="M 274 -35 A 278 278 0 0 1 110 255"/>
    <path class="ring" d="M -110 255 A 278 278 0 0 1 -274 35"/>
    <path class="ring" d="M -274 -35 A 278 278 0 0 1 -255 -110"/>
    <path class="ring" d="M 255 110 A 278 278 0 0 1 110 255"/>

    <rect class="tick" x="-8.5" y="-332" width="17" height="65" rx="1"/>
    <rect class="tick" x="-8.5" y="267" width="17" height="65" rx="1"/>
    <rect class="tick" x="-337" y="-8.5" width="65" height="17" rx="1"/>
    <rect class="tick" x="272" y="-8.5" width="65" height="17" rx="1"/>

    <path class="dash-ring" d="M -205 -158 A 258 222 0 0 1 205 -158"/>
    <path class="dash-ring" d="M -205 158 A 258 222 0 0 0 205 158"/>

    <g id="network">
      <path class="net-line" d="M -172 -127 L -84 -196 L 0 -214 L 86 -118 L 180 -162"/>
      <path class="net-line" d="M -172 -127 L -95 -5 L -18 -76 L 0 -214"/>
      <path class="net-line" d="M -95 -5 L -3 18 L 95 -84 L 180 -162"/>
      <path class="net-line" d="M 86 -118 L 180 -162 L 122 64 L 23 168"/>
      <path class="net-line" d="M -214 112 L -144 118 L 0 214 L 104 120 L 210 176"/>
      <path class="net-line" d="M -214 112 L -188 5 L -144 118 L 0 214"/>
      <path class="net-line" d="M -3 18 L 23 168 L 104 120"/>
      <path class="net-line" d="M -18 -76 L 86 -118"/>
    </g>

    <g id="vn-monogram">
      <path d="M -284 -88 L -205 -88 L -75 153 L -75 -88 L 9 -88 L 9 174 L -78 174 Z" fill="url(#blueGrad)"/>
      <path d="M -268 -88 L -205 -88 L -75 153 L -75 174 L -118 174 Z" fill="#0A4C95" opacity=".42"/>
      <path d="M 35 174 L -12 174 L -12 28 L 41 -30 L 178 174 L 246 174 L 246 -88 L 162 -88 L 162 78 L 41 -88 L -12 -88 L -12 -35 Z" fill="url(#goldGrad)"/>
      <path d="M 35 174 L 178 174 L 41 -88 L -12 -88 L -12 -35 Z" fill="#B9842F" opacity=".32"/>
    </g>

    <g id="nodes">
      <circle class="node-blue" cx="0" cy="-214" r="15"/>
      <circle class="node-blue" cx="-172" cy="-127" r="14"/>
      <circle class="node-blue" cx="-18" cy="-76" r="12"/>
      <circle class="node-blue" cx="86" cy="-118" r="12"/>
      <circle class="node-gold" cx="-95" cy="-5" r="10"/>
      <circle class="node-gold" cx="132" cy="-184" r="10"/>
      <circle class="node-red" cx="180" cy="-162" r="14"/>
      <circle class="node-red" cx="-214" cy="112" r="14"/>
      <circle class="node-gold" cx="-144" cy="118" r="10"/>
      <circle class="node-blue" cx="104" cy="120" r="14"/>
      <circle class="node-blue" cx="0" cy="214" r="15"/>
      <circle cx="0" cy="0" r="26" fill="#FFFFFF" opacity=".97"/>
      <circle cx="0" cy="0" r="21" fill="url(#goldGrad)"/>
      <circle cx="0" cy="0" r="14" fill="url(#blueGrad)"/>
    </g>
  </g>

</svg>
